<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Initiator App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell portrait">
    <header class="header card">
      <h1>Initiator</h1>
      <p>General Oluyede</p>
    </header>

    <section class="content">
      <article class="card photo-card">
        <h2 id="name">Pending name</h2>
        <div class="placeholder">Portrait placeholder</div>
      </article>

      <article class="card">
        <h2>Biography</h2>
        <p id="bio">Pending biography</p>
      </article>

      <article class="card">
        <h2>Achievements</h2>
        <ul id="achievements"></ul>
      </article>

      <article class="card">
        <h2>Gallery</h2>
        <div id="gallery" class="gallery"></div>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
